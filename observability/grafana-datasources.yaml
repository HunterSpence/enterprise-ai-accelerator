# observability/grafana-datasources.yaml
# Grafana datasource provisioning — mounted at startup by docker-compose.obs.yaml

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: eaa-prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: "15s"

  - name: Jaeger
    type: jaeger
    uid: eaa-jaeger
    access: proxy
    url: http://jaeger:16686
    jsonData:
      tracesToLogsV2:
        datasourceUid: ""
