# observability/docker-compose.obs.yaml
# ======================================
# One-shot local observability stack for the Enterprise AI Accelerator.
#
# Services:
#   otel-collector  — OTLP receiver + Prometheus/Jaeger/file exporters
#   prometheus      — Metric store, scrapes otel-collector and the app
#   grafana         — Dashboards (auto-provisions datasources + eaa_platform.json)
#   jaeger          — Distributed trace UI
#
# Usage:
#   docker compose -f docker-compose.obs.yaml up -d
#
# Ports exposed on localhost:
#   4317  — OTLP gRPC (set OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317)
#   4318  — OTLP HTTP
#   9090  — Prometheus UI
#   3000  — Grafana UI (admin / admin)
#   16686 — Jaeger UI
#   13133 — OTEL Collector health check
#
# Point the EAA app at OTEL:
#   export OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
#   python mcp_server.py
#
# All images are OSS and self-hosted — no external accounts required.

version: "3.9"

networks:
  obs:
    driver: bridge

volumes:
  prometheus_data: {}
  grafana_data: {}

services:
  # --------------------------------------------------------------------------
  # OpenTelemetry Collector
  # --------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: eaa-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /tmp/otel-traces:/tmp   # persists trace JSONL between restarts
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter (scraped by prometheus service)
      - "13133:13133" # health_check extension
      - "55679:55679" # zpages UI
    networks: [obs]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --------------------------------------------------------------------------
  # Prometheus
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: eaa-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks: [obs]
    depends_on:
      otel-collector:
        condition: service_healthy
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Grafana
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: eaa-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana_dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    ports:
      - "3000:3000"
    networks: [obs]
    depends_on:
      - prometheus
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Jaeger (all-in-one — development grade)
  # --------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.59
    container_name: eaa-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC model port (used by otel-collector)
    networks: [obs]
    restart: unless-stopped
