name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: pytest / python-${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Canonical test suite — 380+ tests across all modules, fully mocked,
      # no network or API calls. This is the required gate.
      - name: Run canonical suite (tests/)
        run: |
          pytest tests/ \
            --tb=short \
            --junitxml=reports/main_suite.xml \
            --cov=. \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing \
            -m "not network" \
            -v

      # Per-module legacy tests — informational only. Some require live APIs
      # and are excluded from the main gate.
      - name: Run ai_audit_trail legacy tests (informational)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pytest ai_audit_trail/tests/ --tb=line -q || true
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-python-${{ matrix.python-version }}
          path: reports/
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python-${{ matrix.python-version }}
          path: reports/coverage.xml
          retention-days: 30

  lint:
    name: lint / ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          pip install ruff>=0.4.0
          ruff check . --output-format=github --exit-zero
        continue-on-error: true

  docker-validate:
    name: docker-compose validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose config
        run: |
          docker compose -f docker-compose.yml config --quiet
        env:
          ANTHROPIC_API_KEY: sk-test-dummy
