name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  compile:
    name: compile / ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Compile all sources (fails on any uncompilable file)
        run: python -m compileall -q .

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      # Blocking on the crash-class rules only: syntax errors (E9), undefined
      # names / f-string bugs (F63, F7, F82). This is exactly what P0-06 was —
      # uncompilable code shipping green. The ~1.2k pre-existing style findings
      # are a separate cleanup ratchet and must not block merges yet.
      - name: Lint — crash-class rules (blocking)
        run: ruff check --select E9,F63,F7,F82 .

      - name: Lint — full ruff (informational)
        run: ruff check . || true

  tests:
    name: pytest / python-${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: compile

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Dummy key only — no network/API calls are made by the offline suite.
      - name: Run pytest (all test directories)
        env:
          ANTHROPIC_API_KEY: "sk-ant-dummy-key-for-ci"
        run: python -m pytest --tb=short -q -m "not network"

  evals:
    name: evals (offline)
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run eval harness (offline mode)
        run: python -m evals.run --offline

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/results/
          if-no-files-found: ignore

  wheel-completeness:
    name: build wheel / import all packages
    runs-on: ubuntu-latest
    needs: compile

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Install wheel into a clean venv
        run: |
          python -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install --upgrade pip
          /tmp/wheel-venv/bin/pip install dist/*.whl

      # Proves the wheel actually ships every advertised top-level package —
      # this is the exact bug (P0-07) an incomplete packages.find include list caused.
      # ponytail: 'observability' is excluded here — it is an ops/deploy config
      # dir (otel-collector.yaml, grafana dashboards, docker-compose.obs.yaml),
      # not a Python package (no __init__.py). It stays in pyproject's include
      # list as a harmless no-op in case that changes later.
      - name: Import every top-level package from the installed wheel
        run: |
          cd /tmp
          /tmp/wheel-venv/bin/python -c "
          import importlib
          for pkg in [
              'core', 'auth', 'iac_security', 'app_portfolio', 'executive_chat',
              'integrations', 'compliance_citations', 'cloud_iq', 'ai_audit_trail',
              'finops_intelligence', 'migration_scout', 'policy_guard', 'agent_ops',
              'evals',
          ]:
              importlib.import_module(pkg)
              print('OK', pkg)
          "

  docker-validate:
    name: docker-compose validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose config
        run: docker compose -f docker-compose.yml config --quiet
        env:
          ANTHROPIC_API_KEY: sk-test-dummy
          EAA_API_KEY: sk-test-dummy
