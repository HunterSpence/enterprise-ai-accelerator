version: "3.9"

# =============================================================================
# CloudIQ V2 — Docker Compose Stack
#
# Services:
#   cloudiq   — FastAPI application
#   postgres  — PostgreSQL for scan result persistence (optional)
#   redis     — Celery broker + result backend (optional)
#
# Run:
#   docker compose up --build         (all services)
#   docker compose up cloudiq          (API only, uses in-memory store)
#   docker compose --profile demo up   (includes demo runner)
# =============================================================================

services:
  cloudiq:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: cloudiq:v2
    container_name: cloudiq-api
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - DATABASE_URL=postgresql://cloudiq:cloudiq@postgres:5432/cloudiq
      - REDIS_URL=redis://redis:6379/0
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - PAGERDUTY_INTEGRATION_KEY=${PAGERDUTY_INTEGRATION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - cloudiq-net

  postgres:
    image: postgres:16-alpine
    container_name: cloudiq-postgres
    environment:
      POSTGRES_DB: cloudiq
      POSTGRES_USER: cloudiq
      POSTGRES_PASSWORD: cloudiq
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudiq -d cloudiq"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cloudiq-net

  redis:
    image: redis:7-alpine
    container_name: cloudiq-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cloudiq-net

  # Demo runner — runs the cinematic CLI demo and exits
  demo:
    profiles: ["demo"]
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: cloudiq:v2
    container_name: cloudiq-demo
    command: ["python", "-m", "cloud_iq.demo_v2", "--fast"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    networks:
      - cloudiq-net

volumes:
  postgres-data:
  redis-data:

networks:
  cloudiq-net:
    driver: bridge
